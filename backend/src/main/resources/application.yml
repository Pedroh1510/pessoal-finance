spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finance}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  session:
    jdbc:
      initialize-schema: never
      table-name: SPRING_SESSION
    timeout: 28800  # 8 horas em segundos
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:finance}
    password: ${RABBITMQ_PASSWORD:finance}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  queue:
    consumer:
      concurrency: 1
    retry:
      max-attempts: 3
      initial-interval: 5000
      multiplier: 5.0
    file:
      temp-dir: /tmp/ph-finance
